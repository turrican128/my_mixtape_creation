<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Mixtape Creator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Warning banner -->
        <div class="warning-banner hidden" id="warning-banner">
            <span class="warning-icon">⚠️</span>
            <span id="warning-text"></span>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <span class="header-icon">🎵</span>
                <h1>Mixtape Creator</h1>
            </div>
            <div class="header-info" id="header-info">
                <span class="total-duration" id="total-duration">--:--</span>
                <span class="track-count" id="track-count">0 tracks</span>
                <button class="btn btn-upload btn-sm hidden" id="btn-show-upload" title="Upload the built mixtape to Mixcloud">
                    ☁ Upload to Mixcloud
                </button>
                <button class="btn btn-danger btn-sm hidden" id="btn-cleanup" title="Move source tracks to the Recycle Bin and clear the build, ready for the next mix">
                    🧹 Clean up
                </button>
                <a href="/settings" class="btn btn-sm btn-secondary">&#9881; Settings</a>
            </div>
        </header>

        <!-- Main content -->
        <main class="main">
            <!-- Track list panel -->
            <section class="track-panel">
                <div class="panel-header">
                    <h2>Tracks</h2>
                    <div class="panel-actions">
                        <span class="saved-hint" id="saved-hint"></span>
                        <button class="btn btn-sm btn-secondary" id="btn-reset" title="Restore all songs and clear removed tracks">
                            ⟲ Reset
                        </button>
                        <button class="btn btn-sm btn-secondary" id="btn-refresh" title="Rescan folder">
                            ↻ Refresh
                        </button>
                    </div>
                </div>
                <div class="track-list" id="track-list">
                    <div class="loading" id="loading">Loading tracks…</div>
                </div>
            </section>

            <!-- Build section -->
            <aside class="build-panel">
                <div class="build-section">
                    <button class="btn btn-primary btn-lg" id="btn-build" disabled>
                        ⚡ Build Mixtape
                    </button>
                    <div class="build-status" id="build-status"></div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay hidden" id="upload-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>☁ Upload to Mixcloud</h2>
                <button class="modal-close" id="btn-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label class="setting-label" for="upload-name">Mixtape Name</label>
                    <input type="text" id="upload-name" class="setting-input" placeholder="My Awesome Mixtape">
                </div>
                <div class="setting-group">
                    <label class="setting-label" for="upload-description">Description</label>
                    <textarea id="upload-description" class="setting-input upload-textarea" placeholder="Tell listeners about this mix..." rows="3"></textarea>
                </div>
                <div class="setting-group">
                    <label class="setting-label" for="upload-tags">Tags <small>(comma-separated)</small></label>
                    <input type="text" id="upload-tags" class="setting-input" placeholder="mixtape, dj, electronic">
                </div>

                <!-- Cover art -->
                <div class="setting-group">
                    <label class="setting-label" for="cover-preset">
                        Cover Art Preset
                        <small id="cover-base-note" class="cover-base-note"></small>
                    </label>
                    <select id="cover-preset" class="setting-input">
                        <option value="neon">Neon — hot pink + cyan glow</option>
                        <option value="chrome">Chrome — metallic silver</option>
                        <option value="outrun">Outrun — magenta/amber gradient</option>
                    </select>
                    <label class="setting-label cover-text-size-label" for="cover-text-size">
                        Text Size
                    </label>
                    <select id="cover-text-size" class="setting-input">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                    <div class="cover-preview-wrap">
                        <img id="cover-preview" class="cover-preview hidden" alt="Cover preview">
                        <div id="cover-preview-placeholder" class="cover-preview-placeholder">
                            Cover preview will appear here
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btn-modal-cancel">Cancel</button>
                <button class="btn btn-upload" id="btn-upload">Upload</button>
            </div>
            <div class="upload-status" id="upload-status"></div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay hidden" id="confirm-modal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h2 id="confirm-title">Confirm</h2>
                <button class="modal-close" id="confirm-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirm-message" class="confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
                <button class="btn btn-primary" id="confirm-ok">Confirm</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
